<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HL | EDITOR PRO</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        :root { --bg: #ffffff; --black: #000; --apple: #f5f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--apple); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .editor { width: 100%; max-width: 650px; background: var(--bg); border-radius: 24px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .title-in { width: 100%; border: none; font-size: 32px; font-weight: 800; margin-bottom: 30px; outline: none; }
        .block { background: var(--apple); border-radius: 12px; padding: 20px; margin-bottom: 10px; position: relative; }
        textarea, input { width: 100%; border: 1px solid #d2d2d7; border-radius: 8px; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; }
        .btn-pub { background: #0071e3; color: #fff; margin-left: auto; }
    </style>
</head>
<body>
<div class="editor">
    <input type="text" id="postTitle" class="title-in" placeholder="Заголовок">
    <div id="canvas"></div>
    <div class="controls">
        <button class="btn" onclick="add('text')">+ Текст</button>
        <button class="btn" onclick="add('image')">+ Фото</button>
        <button class="btn btn-pub" onclick="publish()">Опубликовать</button>
    </div>
</div>
<script>
    let blocks = [];
    const database = firebase.database(); // Прямое обращение к базе

    function add(t) { blocks.push({ id: Date.now(), type: t, content: "" }); render(); }
    function render() {
        const c = document.getElementById('canvas'); c.innerHTML = "";
        blocks.forEach(b => {
            const div = document.createElement('div'); div.className = "block";
            div.innerHTML = `<small>${b.type.toUpperCase()}</small>
                ${b.type === 'text' 
                ? `<textarea oninput="blocks.find(x=>x.id===${b.id}).content=this.value"></textarea>`
                : `<input type="text" oninput="blocks.find(x=>x.id===${b.id}).content=this.value" placeholder="URL картинки">`}`;
            c.appendChild(div);
        });
    }
    async function publish() {
        const t = document.getElementById('postTitle').value;
        if(!t || blocks.length === 0) return alert("Заполни поля");
        try {
            await database.ref('articles').push({ title: t, blocks: blocks, date: Date.now() });
            alert("Опубликовано!"); location.reload();
        } catch(e) { 
            console.log(e);
            alert("Ошибка! Проверь Rules в Database в консоли Firebase"); 
        }
    }
</script>
</body>
</html>
