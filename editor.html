<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Article | HEALTHLOGIC</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22Inter, sans-serif%22 font-size=%2260%22 font-weight=%22900%22 fill=%22white%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; 
            --accent: #007aff; 
            --secondary: #f5f5f7;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: #1d1d1f; 
            padding-bottom: 100px;
        }

        /* HEADER */
        .editor-header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .btn-back { text-decoration: none; color: #86868b; font-weight: 600; transition: 0.3s; }
        .btn-back:hover { color: #000; }

        .btn-publish {
            background: var(--accent); color: #fff; border: none;
            padding: 10px 24px; border-radius: 50px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-publish:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0,122,255,0.3); }

        /* CANVAS */
        .canvas { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        
        .main-title-input {
            width: 100%; border: none; outline: none;
            font-size: 48px; font-weight: 900; letter-spacing: -2px;
            margin-bottom: 40px; color: #000;
        }
        .main-title-input::placeholder { color: #e5e5e5; }

        /* DYNAMIC BLOCKS */
        .block-wrapper { position: relative; margin-bottom: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-text { 
            width: 100%; border: none; outline: none; font-size: 18px; 
            line-height: 1.6; resize: none; margin-bottom: 10px;
        }
        .input-subtitle {
            width: 100%; border: none; outline: none; font-size: 24px;
            font-weight: 700; margin-bottom: 15px; letter-spacing: -0.5px;
        }
        .input-image-url {
            width: 100%; padding: 12px; border-radius: 12px;
            background: var(--secondary); border: 1px solid #d2d2d7;
            font-family: inherit; margin-bottom: 10px;
        }
        .preview-img {
            width: 100%; border-radius: 16px; margin-top: 10px;
            max-height: 450px; object-fit: cover; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* TOOLBAR */
        .toolbar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #000; padding: 8px; border-radius: 50px;
            display: flex; gap: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .tool-btn {
            background: none; border: none; color: #fff; padding: 12px 20px;
            font-weight: 700; font-size: 13px; cursor: pointer; border-radius: 40px;
            transition: 0.3s;
        }
        .tool-btn:hover { background: rgba(255,255,255,0.15); }

        /* TOAST */
        #toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #1d1d1f; color: #fff; padding: 16px 32px; border-radius: 50px;
            font-weight: 600; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0;
        }
        #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="editor-header">
    <a href="admin.html" class="btn-back">← Отмена</a>
    <button class="btn-publish" id="publish-btn">Опубликовать</button>
</header>

<main class="canvas">
    <input type="text" class="main-title-input" id="main-title" placeholder="Заголовок статьи">
    <div id="editor-content">
        </div>
</main>

<div class="toolbar">
    <button class="tool-btn" onclick="addBlock('text')">+ Статья</button>
    <button class="tool-btn" onclick="addBlock('subtitle')">+ Заголовок</button>
    <button class="tool-btn" onclick="addBlock('image')">+ Фото</button>
</div>

<div id="toast">Уведомление</div>

<script type="module">
    import { db, auth } from './components.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const contentArea = document.getElementById('editor-content');
    const adminEmail = "ttokyoshik@gmail.com";

    // Проверка прав
    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== adminEmail) window.location.href = "index.html";
    });

    function notify(text) {
        const t = document.getElementById('toast');
        t.textContent = text;
        t.classList.add('visible');
        setTimeout(() => t.classList.remove('visible'), 3000);
    }

    // Функция добавления блоков
    window.addBlock = (type) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'block-wrapper';
        
        if (type === 'text') {
            wrapper.innerHTML = `<textarea class="input-text" placeholder="Начните писать историю..." oninput="autoHeight(this)"></textarea>`;
        } else if (type === 'subtitle') {
            wrapper.innerHTML = `<input type="text" class="input-subtitle" placeholder="Подзаголовок">`;
        } else if (type === 'image') {
            wrapper.innerHTML = `
                <input type="text" class="input-image-url" placeholder="Вставьте ссылку на фото (Unsplash, и т.д.)" onchange="previewImg(this)">
                <img src="" class="preview-img">
            `;
        }
        contentArea.appendChild(wrapper);
    };

    window.autoHeight = (el) => {
        el.style.height = "auto";
        el.style.height = (el.scrollHeight) + "px";
    };

    window.previewImg = (el) => {
        const img = el.nextElementSibling;
        if (el.value) {
            img.src = el.value;
            img.style.display = 'block';
        }
    };

    // Сбор данных и публикация
    document.getElementById('publish-btn').onclick = async () => {
        const title = document.getElementById('main-title').value;
        if (!title) return notify("Нужен заголовок!");

        const blocks = [];
        const wrappers = document.querySelectorAll('.block-wrapper');
        
        wrappers.forEach(w => {
            const text = w.querySelector('.input-text');
            const sub = w.querySelector('.input-subtitle');
            const img = w.querySelector('.input-image-url');
            
            if (text) blocks.push({ type: 'text', content: text.value });
            if (sub) blocks.push({ type: 'subtitle', content: sub.value });
            if (img) blocks.push({ type: 'image', content: img.value });
        });

        try {
            await addDoc(collection(db, "news"), {
                title: title,
                desc: blocks.find(b => b.type === 'text')?.content || "", // Для превью в ленте
                content: blocks,
                createdAt: new Date()
            });
            notify("Статья опубликована!");
            setTimeout(() => window.location.href = "admin.html", 2000);
        } catch (e) {
            notify("Ошибка при сохранении");
        }
    };

    // Добавляем первый блок текста по умолчанию
    addBlock('text');
</script>

</body>
</html>
