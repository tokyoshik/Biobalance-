<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | HEALTHLOGIC</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22Inter, sans-serif%22 font-size=%2260%22 font-weight=%22900%22 fill=%22white%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f7; --accent: #007aff; --radius: 32px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            animation: appleReveal 0.8s ease-out;
        }

        @keyframes appleReveal {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        h1 { font-size: 32px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 30px; }
        
        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid #d2d2d7;
            background: #fbfbfd;
            font-size: 16px;
            font-family: inherit;
            transition: 0.2s;
        }

        input:focus { outline: none; border-color: var(--accent); background: #fff; }

        .main-btn {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            border: none;
            background: #000;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .main-btn:hover { transform: scale(1.02); opacity: 0.9; }

        .toggle-box { margin-top: 25px; font-size: 14px; color: #86868b; }
        .toggle-link { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: none; }
        
        .home-link { display: block; margin-top: 30px; font-size: 12px; color: #86868b; text-decoration: none; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h1 id="auth-title">Вход</h1>
    
    <div id="auth-form">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="main-btn" id="submit-btn">Продолжить</button>
    </div>

    <div class="toggle-box">
        <span id="toggle-text">Впервые в Healthlogic?</span> 
        <span class="toggle-link" id="toggle-btn">Создать аккаунт</span>
    </div>

    <a href="index.html" class="home-link">← НА ГЛАВНУЮ</a>
</div>

<script type="module">
    import { auth } from './components.js';
    import { 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const title = document.getElementById('auth-title');
    const submitBtn = document.getElementById('submit-btn');
    const toggleBtn = document.getElementById('toggle-btn');
    const toggleText = document.getElementById('toggle-text');
    
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');

    let isLoginMode = true;

    // Смена режима: Вход / Регистрация
    toggleBtn.addEventListener('click', () => {
        isLoginMode = !isLoginMode;
        title.textContent = isLoginMode ? "Вход" : "Регистрация";
        submitBtn.textContent = isLoginMode ? "Войти" : "Создать аккаунт";
        toggleText.textContent = isLoginMode ? "Впервые в Healthlogic?" : "Уже есть аккаунт?";
        toggleBtn.textContent = isLoginMode ? "Создать аккаунт" : "Войти в систему";
    });

    // Обработка клика по главной кнопке
    submitBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        const password = passInput.value;

        if (!email || !password) {
            alert("Заполните Email и Пароль");
            return;
        }

        try {
            if (isLoginMode) {
                await signInWithEmailAndPassword(auth, email, password);
                console.log("Вход выполнен");
            } else {
                await createUserWithEmailAndPassword(auth, email, password);
                console.log("Аккаунт создан");
            }
            // Редирект на index.html (явно указываем файл для GitHub)
            window.location.href = "index.html";
        } catch (error) {
            console.error("Auth Error:", error);
            alert("Ошибка: " + error.message);
        }
    });
</script>

</body>
</html>
