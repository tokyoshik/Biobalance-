<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | HEALTHLOGIC</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22black%22/><text y=%2250%%22 x=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-family=%22Inter, sans-serif%22 font-size=%2260%22 font-weight=%22900%22 fill=%22white%22>H</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f5f5f7; --radius: 32px; --accent: #007aff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #1d1d1f; padding-top: 100px; }

        /* HEADER */
        .main-header { position: fixed; top: 0; width: 100%; height: 64px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); z-index: 2000; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .logo { font-weight: 900; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; }
        .logo-icon { width: 24px; height: 24px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 14px; }
        .nav-right a { text-decoration: none; color: #1d1d1f; font-size: 14px; font-weight: 600; margin-left: 20px; }

        /* PROFILE CONTENT */
        .profile-container { max-width: 600px; margin: 0 auto; padding: 0 5%; animation: appleReveal 0.6s ease-out; }
        .profile-card { background: #fff; border-radius: var(--radius); padding: 40px; border: 1px solid rgba(0,0,0,0.05); text-align: center; }
        
        .avatar { width: 80px; height: 80px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; margin: 0 auto 20px; }
        
        h1 { font-size: 32px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 5px; }
        .email-label { color: #86868b; margin-bottom: 30px; font-size: 16px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-item { background: #fbfbfd; padding: 20px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.02); }
        .stat-item span { display: block; font-size: 10px; font-weight: 800; color: #86868b; text-transform: uppercase; margin-bottom: 5px; }
        .stat-item p { font-size: 18px; font-weight: 800; }

        .admin-btn { display: block; margin-top: 20px; padding: 18px; background: #000; color: #fff; text-decoration: none; border-radius: 50px; font-weight: 700; transition: 0.3s; }
        .logout-link { display: block; margin-top: 30px; color: #ff3b30; text-decoration: none; font-weight: 700; font-size: 14px; cursor: pointer; }

        @keyframes appleReveal {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header class="main-header">
    <a href="index.html" class="logo">
        <div class="logo-icon">H</div>
        HEALTHLOGIC
    </a>
    <nav class="nav-right">
        <a href="index.html">Главная</a>
    </nav>
</header>

<main class="profile-container">
    <div class="profile-card">
        <div class="avatar" id="user-icon">U</div>
        <h1 id="user-title">Загрузка...</h1>
        <p class="email-label" id="user-email">Проверка авторизации</p>

        <div class="stat-grid">
            <div class="stat-item">
                <span>Ранг</span>
                <p id="user-rank">Athlete</p>
            </div>
            <div class="stat-item">
                <span>Доступ</span>
                <p>Full</p>
            </div>
        </div>

        <a href="admin.html" id="admin-link" class="admin-btn" style="display: none;">Управление системой</a>
        
        <span class="logout-link" id="logout-btn">Выйти из аккаунта</span>
    </div>
</main>

<script type="module">
    import { auth, logoutUser } from './components.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const adminEmail = "ttokyoshik@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('user-title').innerText = user.email.split('@')[0];
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-icon').innerText = user.email.charAt(0).toUpperCase();

            if (user.email === adminEmail) {
                document.getElementById('user-rank').innerText = "Admin";
                document.getElementById('admin-link').style.display = 'block';
            }
        } else {
            // Если не вошел - перекидываем на логин
            window.location.href = "login.html";
        }
    });

    document.getElementById('logout-btn').onclick = () => {
        logoutUser();
    };
</script>

</body>
</html>
