<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthLogic | Мой Профиль</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #FDF5E6; --black: #000; --border: 4px solid #000; --accent: #DED7B1; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); overflow-x: hidden; }

        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }

        /* Карточка профиля */
        .profile-card {
            background: #fff;
            border: var(--border);
            box-shadow: 12px 12px 0px #000;
            padding: 30px;
            margin-top: 40px;
        }

        h1 { font-weight: 900; text-transform: uppercase; font-size: 32px; margin-bottom: 20px; border-bottom: var(--border); padding-bottom: 10px; }

        .info-item { margin-bottom: 25px; }
        .info-item label { display: block; font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.6; }
        
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 12px;
            border: 2px solid #000;
            margin-bottom: 20px;
        }
        .status-verified { background: #b1debd; } /* Зеленый */
        .status-unverified { background: #deb1b1; } /* Красный */

        input {
            width: 100%;
            padding: 15px;
            border: var(--border);
            font-family: inherit;
            font-weight: 700;
            font-size: 16px;
            outline: none;
            background: #f9f9f9;
        }
        input:focus { background: var(--accent); }

        .save-btn {
            width: 100%;
            padding: 18px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .save-btn:hover { background: var(--accent); color: #000; transform: translate(-3px, -3px); box-shadow: 6px 6px 0px #000; }

        .logout-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #ff0000;
            font-weight: 900;
            text-decoration: underline;
            text-transform: uppercase;
            font-size: 13px;
            cursor: pointer;
        }

        header#main-header { position: sticky; top: 0; z-index: 1000; }
    </style>
</head>
<body>

    <header id="main-header"></header>

    <div class="container">
        <div class="profile-card">
            <h1>Личные данные</h1>
            
            <div id="verify-status" class="status-badge">Загрузка...</div>

            <div class="info-item">
                <label>Твой ID (UID)</label>
                <input type="text" id="user-uid" readonly style="font-size: 10px; opacity: 0.5;">
            </div>

            <div class="info-item">
                <label>Email</label>
                <input type="text" id="user-email" readonly>
            </div>

            <div class="info-item">
                <label>Имя пользователя (Никнейм)</label>
                <input type="text" id="user-name" placeholder="Введите ваше имя">
            </div>

            <button class="save-btn" onclick="saveProfile()">Сохранить настройки</button>
            
            <div class="logout-btn" onclick="logout()">Выйти из системы</div>
        </div>

        <center style="margin-top: 30px;">
            <a href="index.html" style="font-weight: 800; text-transform: uppercase; color: #000; font-size: 12px; text-decoration: none;">← Вернуться на главную</a>
        </center>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgjwzfctB0Z9Lyak4WXTo_wxb2vS5L-rs",
            authDomain: "healthlogic-fe5bd.firebaseapp.com",
            databaseURL: "https://healthlogic-fe5bd-default-rtdb.firebaseio.com",
            projectId: "healthlogic-fe5bd",
            storageBucket: "healthlogic-fe5bd.firebasestorage.app",
            messagingSenderId: "177114233773",
            appId: "1:177114233773:web:0e341fb52efcf7dc2cff24"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();

        // Загрузка данных
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('user-email').value = user.email;
                document.getElementById('user-uid').value = user.uid;

                // Статус верификации
                const vStatus = document.getElementById('verify-status');
                if (user.emailVerified) {
                    vStatus.innerText = "Почта подтверждена";
                    vStatus.className = "status-badge status-verified";
                } else {
                    vStatus.innerText = "Почта не подтверждена";
                    vStatus.className = "status-badge status-unverified";
                }

                // Имя из базы данных
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val();
                    if (data && data.username) {
                        document.getElementById('user-name').value = data.username;
                    }
                });
            } else {
                window.location.href = "auth.html";
            }
        });

        // Сохранение
        function saveProfile() {
            const user = auth.currentUser;
            const newName = document.getElementById('user-name').value;

            if (user) {
                db.ref('users/' + user.uid).update({
                    username: newName
                }).then(() => {
                    showToast("Данные успешно обновлены!");
                }).catch(err => {
                    showToast("Ошибка: " + err.message);
                });
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>
    <script src="components.js"></script>

</body>
</html>
