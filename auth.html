<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthLogic | Вход и Регистрация</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #FDF5E6; --black: #000; --border: 4px solid #000; --accent: #DED7B1; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .auth-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 20px;
        }

        .auth-box {
            background: #fff;
            border: var(--border);
            box-shadow: 12px 12px 0px #000;
            padding: 30px;
        }

        h1 { font-weight: 900; text-transform: uppercase; font-size: 28px; margin-bottom: 25px; text-align: center; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 900; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        
        input {
            width: 100%;
            padding: 15px;
            border: var(--border);
            font-family: inherit;
            font-weight: 700;
            outline: none;
            background: #f9f9f9;
        }
        input:focus { background: var(--accent); }

        .btn {
            width: 100%;
            padding: 18px;
            background: #000;
            color: #fff;
            border: none;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .btn:hover { background: var(--accent); color: #000; transform: translate(-3px, -3px); box-shadow: 6px 6px 0px #000; }

        .toggle-auth {
            text-align: center;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
        }

        header#main-header { position: sticky; top: 0; z-index: 1000; }
    </style>
</head>
<body>

    <header id="main-header"></header>

    <div class="auth-container">
        <div class="auth-box" id="login-form">
            <h1>Вход</h1>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="******">
            </div>
            <button class="btn" onclick="signIn()">Войти</button>
            <div class="toggle-auth" onclick="toggleForm('register-form')">Нет аккаунта? Создать</div>
        </div>

        <div class="auth-box" id="register-form" style="display: none;">
            <h1>Регистрация</h1>
            <div class="input-group">
                <label>Имя (как вас называть?)</label>
                <input type="text" id="reg-name" placeholder="Дмитрий">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Пароль (мин. 6 знаков)</label>
                <input type="password" id="reg-password" placeholder="******">
            </div>
            <button class="btn" onclick="signUp()">Зарегистрироваться</button>
            <div class="toggle-auth" onclick="toggleForm('login-form')">Уже есть аккаунт? Войти</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBgjwzfctB0Z9Lyak4WXTo_wxb2vS5L-rs",
            authDomain: "healthlogic-fe5bd.firebaseapp.com",
            databaseURL: "https://healthlogic-fe5bd-default-rtdb.firebaseio.com",
            projectId: "healthlogic-fe5bd",
            storageBucket: "healthlogic-fe5bd.firebasestorage.app",
            messagingSenderId: "177114233773",
            appId: "1:177114233773:web:0e341fb52efcf7dc2cff24"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.database();

        function toggleForm(id) {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        // ВХОД
        function signIn() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => window.location.href = "index.html")
                .catch(err => showToast("Ошибка: " + err.message));
        }

        // РЕГИСТРАЦИЯ
        function signUp() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;

            if (!name) return showToast("Введите имя!");

            auth.createUserWithEmailAndPassword(email, pass)
                .then((result) => {
                    const user = result.user;
                    // Создаем запись пользователя в базе
                    db.ref('users/' + user.uid).set({
                        username: name,
                        role: 'user'
                    }).then(() => {
                        // Отправляем письмо подтверждения
                        user.sendEmailVerification();
                        showToast("Регистрация успешна! Подтвердите почту.");
                        setTimeout(() => window.location.href = "index.html", 2000);
                    });
                })
                .catch(err => showToast("Ошибка: " + err.message));
        }
    </script>
    <script src="components.js"></script>

</body>
</html>
