<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HealthLogic | Авторизация</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #fff; border: 4px solid #000; padding: 40px; box-shadow: 15px 15px 0px #000; width: 100%; max-width: 400px; }
        h2 { text-transform: uppercase; font-weight: 900; margin-bottom: 20px; font-size: 28px; }
        input { width: 100%; padding: 15px; border: 3px solid #000; margin-bottom: 15px; font-weight: 700; outline: none; font-family: inherit; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        button:hover { background: #333; }
        .toggle-btn { background: none; color: #000; border: 2px solid #000; }
        .toggle-btn:hover { background: #eee; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="auth-title">Вход</h2>
    
    <input type="text" id="reg-name" placeholder="ВАШ НИК (Напр: ТОКИО)" style="display:none;">
    
    <input type="email" id="email" placeholder="EMAIL">
    <input type="password" id="pass" placeholder="ПАРОЛЬ">
    
    <button onclick="handleAuth()" id="main-btn">Войти</button>
    <button onclick="toggleMode()" class="toggle-btn" id="toggle-btn">Создать аккаунт</button>
</div>

<script>
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Вход" : "Регистрация";
        document.getElementById('main-btn').innerText = isLoginMode ? "Войти" : "Зарегистрироваться";
        document.getElementById('toggle-btn').innerText = isLoginMode ? "Создать аккаунт" : "Уже есть аккаунт? Войти";
        document.getElementById('reg-name').style.display = isLoginMode ? "none" : "block";
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const name = document.getElementById('reg-name').value;

        if (!email || !pass) return alert("Заполни все поля!");

        try {
            if (isLoginMode) {
                // ВХОД
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                // РЕГИСТРАЦИЯ
                if (!name) return alert("Введите ник!");
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                
                // СРАЗУ создаем запись в базе данных
                await db.ref('users/' + res.user.uid).set({
                    username: name,
                    role: "user" // По умолчанию все юзеры. Админа дашь себе в консоли или через админку.
                });

                // Обновляем имя в самом профиле Firebase (для подстраховки)
                await res.user.updateProfile({ displayName: name });
            }
            // Если всё ок — на главную
            window.location.href = 'index.html';
        } catch (e) {
            alert("Ошибка: " + e.message);
        }
    }
</script>
</body>
</html>
