<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HL | Чтение статьи</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f0f0f0; --white: #fff; --black: #000; --accent: #ffcc00; --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); padding: 20px; overflow-x: hidden; }

        /* HEADER */
        .header { max-width: 1300px; margin: 0 auto 50px; padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border); background: var(--white); }
        .logo { font-weight: 900; font-size: 32px; text-transform: uppercase; letter-spacing: -2px; text-decoration: none; color: #000; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { font-weight: 900; text-transform: uppercase; text-decoration: none; color: #000; font-size: 13px; }

        /* ОСНОВНОЙ КОНТЕЙНЕР (МАКЕТ ИЗ РЕФЕРЕНСА) */
        .article-container { 
            max-width: 1100px; margin: 0 auto; 
            display: flex; flex-direction: column; gap: 20px; 
            opacity: 0; animation: fadeUp 0.8s forwards 0.2s; /* Анимация появления */
        }

        /* КАРТОЧКА СТАТЬИ */
        .article-card-layout { 
            background: var(--white); border: var(--border); padding: 50px; 
            box-shadow: 15px 15px 0px #000; position: relative; 
        }

        /* Заголовок (Огромный капс) */
        .a-title { font-size: clamp(30px, 8vw, 70px); font-weight: 900; text-transform: uppercase; line-height: 0.9; letter-spacing: -3px; margin-bottom: 30px; }

        /* Вспомогательные инпуты (Стиль рамок) */
        .a-input-block { width: 100%; padding: 15px; border: 2px solid #000; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; font-size: 14px; color: #555; }

        /* 50/50 БЛОК */
        .row-50 { display: flex; gap: 20px; margin-bottom: 20px; }
        .col-50 { width: 50%; display: flex; flex-direction: column; gap: 20px; }
        
        .a-text-block { border: 2px solid #000; padding: 20px; min-height: 200px; white-space: pre-wrap; font-size: 18px; line-height: 1.5; font-weight: 600; }
        .a-img-block { border: 2px solid #000; width: 100%; height: 100%; min-height: 200px; object-fit: cover; background: #eee; }

        /* Нижний блок текста */
        .a-final-text { border: 2px solid #000; padding: 20px; font-size: 18px; line-height: 1.5; font-weight: 600; white-space: pre-wrap; }

        /* Кнопка (из макета админки, тут просто декоративная) */
        .a-pub-btn { width: 100%; padding: 20px; background: #000; color: #fff; font-weight: 900; text-transform: uppercase; text-align: center; margin-top: 30px; font-size: 18px; }

        /* СТАТИСТИКА */
        .stats-bar { max-width: 1100px; margin: 40px auto; padding: 20px; background: var(--black); color: var(--accent); border: var(--border); display: flex; justify-content: space-between; font-weight: 900; text-transform: uppercase; }

        /* АНИМАЦИЯ ПОЯВЛЕНИЯ */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Мобильная адаптация */
        @media (max-width: 800px) {
            .article-card-layout { padding: 20px; }
            .row-50 { flex-direction: column; }
            .col-50 { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">HealthLogic</a>
        <div class="nav-links">
            <a href="training.html" class="nav-link">Тренинг</a>
            <a href="magnesium.html" class="nav-link">Магний</a>
            <a href="fiber.html" class="nav-link">Клетчатка</a>
            <a href="about.html" class="nav-link">О проекте</a>
            <div id="user-panel"></div>
        </div>
    </header>

    <main id="article-page" style="display:none;">
        <div class="article-container">
            <div class="article-card-layout">
                <h1 id="a-title" class="a-title">ЗАГРУЗКА...</h1>
                
                <div class="a-input-block">ИНФОРМАЦИЯ О СТАТЬЕ</div>
                
                <div class="row-50">
                    <div class="col-50">
                        <div id="a-text-l" class="a-text-block">Текст (50%)</div>
                    </div>
                    <div class="col-50">
                        <img id="a-img-r" src="" class="a-img-block" onerror="this.src='https://via.placeholder.com/500x300?text=HL+IMAGE'">
                        <div id="a-text-sub" class="a-final-text" style="border-top:none;">Финальный текст</div>
                    </div>
                </div>

                <div class="a-pub-btn">HEALTHLOGIC PUBLICATION</div>
            </div>
        </div>

        <div class="stats-bar">
            <span>👀 ПРОСМОТРЫ: <span id="view-count">0</span></span>
            <button onclick="handleLike()" style="background:none; border:none; color:inherit; font-weight:900; cursor:pointer;">
                ❤️ ЛАЙКИ: <span id="like-count">0</span>
            </button>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        if (!articleId) { window.location.href = 'index.html'; }

        // ЗАГРУЗКА ДАННЫХ
        db.ref(`articles/${articleId}`).on('value', snap => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('a-title').innerText = data.title;
            
            // Распределяем данные по блокам макета
            if (data.blocks) {
                document.getElementById('a-text-l').innerText = data.blocks[0]?.content || "";
                document.getElementById('a-text-sub').innerText = data.blocks[2]?.content || "Дополнительная информация...";
                
                const img = document.getElementById('a-img-r');
                img.src = data.blocks[1]?.content || "";
            }

            document.getElementById('view-count').innerText = data.views || 0;
            document.getElementById('article-page').style.display = 'block';
        });

        trackView(articleId);

        // ЛАЙКИ
        function handleLike() {
            const user = auth.currentUser;
            if (!user) { showNotify("ВОЙДИТЕ В АККАУНТ!"); return; }
            const ref = db.ref(`likes/${articleId}/${user.uid}`);
            ref.once('value').then(s => s.exists() ? ref.remove() : ref.set(true));
        }

        db.ref(`likes/${articleId}`).on('value', snap => {
            document.getElementById('like-count').innerText = Object.keys(snap.val() || {}).length;
        });
    </script>

</body>
</html>
