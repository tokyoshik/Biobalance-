<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | BMR Анализатор</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #FDF5E6; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .calc-box { background: #000; color: #fff; padding: 50px; border: 10px solid #000; box-shadow: 30px 30px 0px #DED7B1; width: 100%; max-width: 500px; }
        h1 { text-transform: uppercase; font-size: 40px; margin-bottom: 30px; border-bottom: 4px solid #DED7B1; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; text-transform: uppercase; color: #DED7B1; margin-bottom: 5px; }
        input, select { width: 100%; padding: 15px; background: #1a1a1a; border: 2px solid #DED7B1; color: #fff; font-size: 18px; font-weight: 900; }
        button { width: 100%; padding: 20px; background: #DED7B1; border: none; font-weight: 900; font-size: 20px; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.2s; }
        button:hover { background: #fff; }
        #result { display: none; margin-top: 30px; border: 3px dashed #DED7B1; padding: 20px; text-align: center; }
        .back { display: block; text-align: center; margin-top: 20px; color: #DED7B1; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

<div class="calc-box">
    <h1>BMR_SYSTEM</h1>
    <div class="input-group">
        <label>Пол</label>
        <select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select>
    </div>
    <div class="input-group">
        <label>Вес (кг)</label>
        <input type="number" id="weight" placeholder="70">
    </div>
    <div class="input-group">
        <label>Рост (см)</label>
        <input type="number" id="height" placeholder="175">
    </div>
    <div class="input-group">
        <label>Возраст</label>
        <input type="number" id="age" placeholder="25">
    </div>
    <div class="input-group">
        <label>Активность</label>
        <select id="act">
            <option value="1.2">Сидячий образ</option>
            <option value="1.375">1-3 тренировки</option>
            <option value="1.55">3-5 тренировок</option>
            <option value="1.725">Тяжелый спорт</option>
        </select>
    </div>
    <button onclick="calculate()">Запустить расчет</button>

    <div id="result">
        <div style="font-size: 14px; color: #DED7B1;">ВАША НОРМА:</div>
        <div style="font-size: 50px;" id="val">0</div>
        <div style="font-size: 20px;">ККАЛ / ДЕНЬ</div>
    </div>
    
    <a href="index.html" class="back">← ВЕРНУТЬСЯ НА ГЛАВНУЮ</a>
</div>

<script>
    function calculate() {
        const w = parseFloat(document.getElementById('weight').value);
        const h = parseFloat(document.getElementById('height').value);
        const a = parseInt(document.getElementById('age').value);
        const g = document.getElementById('gender').value;
        const ac = parseFloat(document.getElementById('act').value);

        if(!w || !h || !a) { alert("Введи все данные, бро!"); return; }

        let bmr = (g === 'male') ? (10 * w + 6.25 * h - 5 * a + 5) : (10 * w + 6.25 * h - 5 * a - 161);
        let res = Math.round(bmr * ac);

        document.getElementById('val').innerText = res;
        document.getElementById('result').style.display = 'block';
    }
</script>
</body>
</html>
