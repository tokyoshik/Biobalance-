<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Главная</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <style>
        :root { --accent: #00ff41; --brd: 4px solid #000; --shd: 8px 8px 0px #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; line-height: 1.2; }
        
        /* NAV */
        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: var(--brd); position: sticky; top: 0; background: #fff; z-index: 100; }
        .logo { font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        .nav-links a, .nav-links button { text-decoration: none; color: #000; font-weight: 900; text-transform: uppercase; margin-left: 20px; font-size: 14px; border: none; background: none; cursor: pointer; }

        /* HERO */
        .hero { padding: 60px 5%; background: var(--accent); border-bottom: var(--brd); }
        .hero h1 { font-size: clamp(40px, 10vw, 120px); font-weight: 900; text-transform: uppercase; line-height: 0.8; letter-spacing: -5px; }
        
        /* TOP 3 GRID */
        .top-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: var(--brd); }
        @media (max-width: 800px) { .top-grid { grid-template-columns: 1fr; } }
        .top-item { padding: 40px; border-right: var(--brd); text-decoration: none; color: #000; transition: 0.2s; }
        .top-item:last-child { border-right: none; }
        .top-item:hover { background: #eee; }
        .top-item h2 { font-size: 32px; font-weight: 900; text-transform: uppercase; margin-top: 20px; }

        /* FEED */
        .feed { padding: 40px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { border: var(--brd); padding: 25px; box-shadow: var(--shd); text-decoration: none; color: #000; transition: 0.1s; }
        .card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px #000; }

        /* FOOTER */
        footer { padding: 60px 5%; background: #000; color: #fff; }
        .disclaimer { font-size: 12px; font-weight: 700; opacity: 0.7; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">HealthLogic</div>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <span id="admin-link" style="display:none;"><a href="admin.html">Админка</a></span>
            <a href="login.html" id="login-btn">Вход</a>
            <button id="logout-btn" style="display:none;" onclick="firebase.auth().signOut()">Выход</button>
        </div>
    </nav>

    <header class="hero">
        <h1>БЕЗ ПРАВА<br>НА ОШИБКУ.</h1>
    </header>

    <div class="top-grid" id="top-list">
        </div>

    <div class="feed" id="main-feed"></div>

    <footer>
        <p class="disclaimer">ДИСКЛЕЙМЕР: МЫ НЕ НЕСЕМ ОТВЕТСТВЕННОСТИ. КОНСУЛЬТИРУЙТЕСЬ С ВРАЧОМ. HEALTHLOGIC 2026.</p>
    </footer>

    <script>
        // СКРЫВАЕМ/ПОКАЗЫВАЕМ АДМИНКУ
        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('admin-link').style.display = 'inline';
                document.getElementById('logout-btn').style.display = 'inline';
                document.getElementById('login-btn').style.display = 'none';
            } else {
                document.getElementById('admin-link').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'none';
                document.getElementById('login-btn').style.display = 'inline';
            }
        });

        // ЗАГРУЗКА СТАТЕЙ
        db.ref('articles').orderByChild('date').on('value', snap => {
            const data = snap.val();
            if(!data) return;
            const list = Object.keys(data).map(k => ({id: k, ...data[k]})).reverse();

            // ТОП-3 (Тренинг, Магний, Клетчатка)
            const topArea = document.getElementById('top-list');
            topArea.innerHTML = "";
            list.slice(0, 3).forEach((p, i) => {
                topArea.innerHTML += `
                    <a href="article.html?id=${p.id}" class="top-item">
                        <small>0${i+1} / PROTOCOL</small>
                        <h2>${p.title}</h2>
                    </a>
                `;
            });

            // ОСТАЛЬНЫЕ
            const feedArea = document.getElementById('main-feed');
            feedArea.innerHTML = "";
            list.slice(3).forEach(p => {
                feedArea.innerHTML += `
                    <a href="article.html?id=${p.id}" class="card">
                        <small>${new Date(p.date).toLocaleDateString()}</small>
                        <h3>${p.title}</h3>
                    </a>
                `;
            });
        });
    </script>
</body>
</html>
