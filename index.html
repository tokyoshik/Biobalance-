<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Главная</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script src="components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #f0f0f0; --white: #fff; --black: #000; --accent: #DED7B1; --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 20px; }

        .header { max-width: 1200px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; font-size: 32px; text-transform: uppercase; letter-spacing: -1px; }

        /* Сетка статей */
        #articles-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Стиль карточки (Брутализм) */
        .article-card { 
            background: var(--white); 
            border: var(--border); 
            padding: 0; 
            box-shadow: 10px 10px 0px var(--black); 
            transition: 0.2s; 
            cursor: pointer;
            overflow: hidden;
        }
        .article-card:hover { transform: translate(-5px, -5px); box-shadow: 15px 15px 0px var(--accent); }
        
        .card-img-wrapper img { width: 100%; height: 200px; object-fit: cover; border-bottom: var(--border); display: block; }
        .card-content { padding: 20px; }
        .card-content h2 { font-weight: 900; text-transform: uppercase; font-size: 20px; margin-bottom: 10px; line-height: 1.1; }
        .card-content p { font-size: 14px; color: #444; margin-bottom: 15px; }
        .card-content span { font-weight: 900; text-transform: uppercase; border-bottom: 2px solid #000; font-size: 12px; }

        .admin-link { text-decoration: none; color: #000; font-weight: 900; border: 2px solid #000; padding: 10px 20px; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">HealthLogic</div>
        <nav>
            <a href="admin.html" class="admin-link">Админка</a>
        </nav>
    </header>

    <main id="articles-container">
        <p style="font-weight: 900; text-transform: uppercase;">Загрузка контента...</p>
    </main>

    <script>
        // Здесь в HTML ничего писать не нужно! 
        // Функция loadArticles() запустится сама из components.js
    </script>

</body>
</html>
