<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Premium Edition</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #0071e3; --bg: #f5f5f7; --glass: rgba(255, 255, 255, 0.7); }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1d1d1f; overflow-x: hidden; }

        /* HEADER: APPLE STYLE GLASS */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000;
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; color: #000; }
        .nav-links a, .nav-links button { 
            text-decoration: none; color: #515154; font-size: 14px; font-weight: 500; 
            margin-left: 25px; background: none; border: none; cursor: pointer;
        }
        .nav-links a:hover { color: var(--accent); }

        /* HERO: SAMSUNG TECH VIBE */
        .hero { 
            height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at center, #fff 0%, #f5f5f7 100%); padding-top: 60px;
        }
        .hero h1 { 
            font-size: clamp(50px, 12vw, 140px); font-weight: 900; line-height: 0.9; letter-spacing: -6px;
            background: linear-gradient(180deg, #1d1d1f 0%, #86868b 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; transform: translateY(40px); animation: fadeUp 1s forwards 0.2s;
        }
        
        /* TOP ARTICLES: BENTO GRID */
        .top-container { padding: 40px 5%; display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; margin-top: -10vh; }
        .top-card { 
            grid-column: span 4; background: #fff; border-radius: 28px; padding: 40px; height: 400px;
            display: flex; flex-direction: column; justify-content: flex-end; text-decoration: none; color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02);
            position: relative; overflow: hidden;
        }
        .top-card:nth-child(1) { grid-column: span 8; background: #000; color: #fff; }
        .top-card:hover { transform: scale(1.02) translateY(-10px); box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .top-card h2 { font-size: 32px; font-weight: 700; margin-top: 10px; line-height: 1.1; }
        .top-card small { text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; font-size: 12px; }

        /* LIST: CLEAN FEED */
        .feed { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
        .article-row { 
            display: flex; justify-content: space-between; align-items: center; padding: 30px 0;
            border-bottom: 1px solid #e5e5e5; text-decoration: none; color: inherit;
        }
        .article-row:hover { padding-left: 20px; color: var(--accent); }
        .article-row h3 { font-size: 24px; font-weight: 600; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .top-card { grid-column: span 12 !important; height: 300px; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">HEALTHLOGIC</div>
    <div class="nav-links">
        <a href="index.html">Главная</a>
        <span id="adm-link" style="display:none;"><a href="admin.html">Админка</a></span>
        <a href="login.html" id="l-btn">Вход</a>
        <button id="o-btn" style="display:none;" onclick="firebase.auth().signOut()">Выход</button>
    </div>
</nav>

<section class="hero">
    <h1>Future<br>Health.</h1>
</section>

<div class="top-container" id="top-list"></div>
<div class="feed" id="main-feed"></div>

<script>
    // AUTH LOGIC
    firebase.auth().onAuthStateChanged(u => {
        document.getElementById('adm-link').style.display = u ? 'inline' : 'none';
        document.getElementById('o-btn').style.display = u ? 'inline' : 'none';
        document.getElementById('l-btn').style.display = u ? 'none' : 'inline';
    });

    // CONTENT LOADING
    db.ref('articles').orderByChild('date').on('value', snap => {
        const data = snap.val(); if(!data) return;
        const list = Object.keys(data).map(k => ({id: k, ...data[k]})).reverse();

        const topArea = document.getElementById('top-list');
        topArea.innerHTML = "";
        list.slice(0, 3).forEach((p, i) => {
            topArea.innerHTML += `
                <a href="article.html?id=${p.id}" class="top-card">
                    <small>Protocol 0${i+1}</small>
                    <h2>${p.title}</h2>
                </a>
            `;
        });

        const feedArea = document.getElementById('main-feed');
        feedArea.innerHTML = "";
        list.slice(3).forEach(p => {
            feedArea.innerHTML += `
                <a href="article.html?id=${p.id}" class="article-row">
                    <h3>${p.title}</h3>
                    <span>${new Date(p.date).toLocaleDateString()} →</span>
                </a>
            `;
        });
    });
</script>
</body>
</html>
