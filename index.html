<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthLogic | Доказательная медицина</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg: #FDF5E6; 
            --black: #000; 
            --border: 4px solid #000; 
            --accent: #DED7B1; 
        }

        /* Общие настройки адаптивности */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            overflow-x: hidden; /* Никакого свайпа влево-вправо */
            width: 100%; 
            background: var(--bg); 
            font-family: 'Inter', sans-serif; 
            color: var(--black);
            line-height: 1.4;
        }

        .container { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px; 
        }

        /* Секция Hero (Заголовок ПК/Мобильный) */
        .hero { margin: 40px 0 30px 0; }
        .hero h1 { 
            font-weight: 900; 
            font-size: clamp(45px, 12vw, 90px); 
            text-transform: uppercase; 
            line-height: 0.85; 
            letter-spacing: -2px;
        }
        .hero p { 
            font-weight: 700; 
            font-size: clamp(14px, 4vw, 18px); 
            margin-top: 20px; 
            max-width: 500px; 
            text-transform: uppercase; 
        }

        /* Навигация (те самые 4 пути) */
        .main-nav { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            margin-bottom: 50px; 
        }
        
        @media (min-width: 768px) { 
            .main-nav { grid-template-columns: repeat(4, 1fr); } 
        }

        .nav-card {
            background: #fff; 
            border: var(--border); 
            padding: 20px; 
            text-align: left;
            text-decoration: none; 
            color: #000; 
            transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            min-height: 120px;
        }

        .nav-card:hover { 
            background: var(--accent); 
            transform: translate(-4px, -4px); 
            box-shadow: 7px 7px 0px #000; 
        }

        .nav-card span { font-weight: 900; font-size: 18px; text-transform: uppercase; display: block; }
        .nav-card small { font-weight: 700; font-size: 11px; opacity: 0.6; margin-top: 5px; }

        /* Заголовок ленты */
        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .section-header h2 { font-weight: 900; text-transform: uppercase; font-size: 22px; }
        .line { flex-grow: 1; height: 4px; background: #000; }

        /* Сетка статей из базы */
        #articles-container { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 25px; 
            margin-bottom: 80px; 
        }
        
        @media (min-width: 768px) { 
            #articles-container { grid-template-columns: repeat(2, 1fr); } 
        }
        
        @media (min-width: 1024px) { 
            #articles-container { grid-template-columns: repeat(3, 1fr); } 
        }

        /* Липкая шапка */
        header#main-header { 
            width: 100%; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
    </style>
</head>
<body>

    <header id="main-header"></header>

    <div class="container">
        
        <section class="hero">
            <h1>HEALTH<br>LOGIC.</h1>
            <p>Твой гид по биохимии организма и долголетию через науку.</p>
        </section>
        
        <nav class="main-nav">
            <a href="training.html" class="nav-card">
                <span>Тренинг</span>
                <small>Анатомия и прогрессия</small>
            </a>
            <a href="magnesium.html" class="nav-card">
                <span>Магний</span>
                <small>Нервы и электролиты</small>
            </a>
            <a href="fiber.html" class="nav-card">
                <span>Клетчатка</span>
                <small>ЖКТ и микробиом</small>
            </a>
            <a href="about.html" class="nav-card">
                <span>О нас</span>
                <small>Миссия проекта</small>
            </a>
        </nav>

        <div class="section-header">
            <h2>База знаний</h2>
            <div class="line"></div>
        </div>
        
        <main id="articles-container">
            <div style="font-weight: 900; padding: 50px; text-align: center; background: #fff; border: 4px solid #000; grid-column: 1/-1;">
                ПОДКЛЮЧЕНИЕ К СЕРВЕРУ...
            </div>
        </main>

    </div>

    <script src="components.js"></script>

</body>
</html>
