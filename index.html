<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthLogic | Главная</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #FDF5E6; --black: #000; --border: 4px solid #000; --accent: #DED7B1; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { overflow-x: hidden; width: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* Стили шапки (прописаны сразу) */
        header#main-header { 
            width: 100%; position: sticky; top: 0; z-index: 1000; 
            background: #fff; border-bottom: var(--border);
        }
        .header-nav {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; max-width: 1200px; margin: 0 auto;
        }
        .logo { font-size: 20px; font-weight: 900; text-decoration: none; color: #000; text-transform: uppercase; }
        
        /* Кнопка входа по умолчанию */
        #auth-status a, #auth-status button {
            text-decoration: none; font-weight: 900; color: #000; 
            border: 2px solid #000; padding: 6px 12px; font-size: 12px;
            background: #fff; cursor: pointer;
        }

        .hero { margin: 40px 0; }
        .hero h1 { font-weight: 900; font-size: clamp(40px, 10vw, 80px); text-transform: uppercase; line-height: 0.9; }
        
        .main-nav { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 50px; }
        @media (min-width: 768px) { .main-nav { grid-template-columns: repeat(4, 1fr); } }

        .nav-card {
            background: #fff; border: var(--border); padding: 20px; text-align: left;
            text-decoration: none; color: #000; transition: 0.2s; display: flex; flex-direction: column;
        }
        .nav-card:hover { background: var(--accent); transform: translate(-4px, -4px); box-shadow: 6px 6px 0px #000; }
        .nav-card span { font-weight: 900; font-size: 18px; text-transform: uppercase; }

        #articles-container { display: grid; grid-template-columns: 1fr; gap: 25px; margin-bottom: 50px; }
        @media (min-width: 768px) { #articles-container { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-nav">
            <a href="index.html" class="logo">HealthLogic.</a>
            <div id="auth-status">
                <a href="auth.html">ВХОД</a>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="hero">
            <h1>HEALTH<br>LOGIC.</h1>
            <p style="font-weight: 700; margin-top: 15px;">БАЗА ЗНАНИЙ О ТВОЕМ ТЕЛЕ</p>
        </section>
        
        <nav class="main-nav">
            <a href="training.html" class="nav-card"><span>Тренинг</span></a>
            <a href="magnesium.html" class="nav-card"><span>Магний</span></a>
            <a href="fiber.html" class="nav-card"><span>Клетчатка</span></a>
            <a href="about.html" class="nav-card"><span>О нас</span></a>
        </nav>

        <main id="articles-container">
            </main>
    </div>

    <script>

        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    </script>
    <script src="components.js"></script>
</body>
</html>
