<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthLogic | Путь Атлета</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="components.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f0f0f0; --white: #fff; --black: #000; --accent: #ffcc00; --border: 4px solid #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); line-height: 1.4; }

        /* HEADER */
        .header { max-width: 1300px; margin: 0 auto; padding: 30px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border); background: var(--white); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; font-size: 38px; text-transform: uppercase; letter-spacing: -2px; cursor: pointer; text-decoration: none; color: #000; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-link { font-weight: 900; text-transform: uppercase; text-decoration: none; color: #000; font-size: 14px; border-bottom: 3px solid transparent; transition: 0.2s; }
        .nav-link:hover { border-color: var(--accent); }

        /* HERO SECTION */
        .hero { max-width: 1300px; margin: 40px auto; padding: 60px 20px; text-align: center; background: var(--accent); border: var(--border); box-shadow: 15px 15px 0px #000; }
        .hero h1 { font-size: clamp(40px, 10vw, 100px); font-weight: 900; text-transform: uppercase; line-height: 0.8; letter-spacing: -4px; margin-bottom: 20px; }
        .hero p { font-size: 20px; font-weight: 700; text-transform: uppercase; max-width: 600px; margin: 0 auto; }

        /* GRID СТАТЕЙ */
        .main-container { max-width: 1300px; margin: 60px auto; padding: 0 20px; }
        .section-title { font-weight: 900; text-transform: uppercase; font-size: 24px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ""; height: 4px; background: #000; flex-grow: 1; }

        #articles-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); 
            gap: 40px; 
        }

        .article-card { 
            background: var(--white); border: var(--border); box-shadow: 10px 10px 0px var(--black); 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column;
        }
        .article-card:hover { transform: translate(-8px, -8px); box-shadow: 18px 18px 0px var(--accent); }
        .card-img { width: 100%; height: 250px; object-fit: cover; border-bottom: var(--border); background: #ddd; }
        .card-content { padding: 25px; flex-grow: 1; }
        .card-tag { display: inline-block; background: var(--black); color: var(--accent); padding: 4px 10px; font-weight: 900; font-size: 11px; text-transform: uppercase; margin-bottom: 15px; }
        .card-content h2 { font-weight: 900; text-transform: uppercase; font-size: 24px; line-height: 1.1; margin-bottom: 15px; }
        .card-footer { padding: 0 25px 25px; display: flex; justify-content: space-between; font-weight: 900; font-size: 13px; text-transform: uppercase; }

        /* FOOTER */
        .footer { background: var(--black); color: var(--white); padding: 80px 20px; margin-top: 100px; text-align: center; }
        .footer-logo { font-size: 50px; font-weight: 900; margin-bottom: 20px; color: var(--accent); }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo">HealthLogic</a>
        <div class="nav-links">
            <a href="about.html" class="nav-link">О проекте</a>
            <div id="user-panel"></div>
        </div>
    </header>

    <section class="hero">
        <h1>Твое тело — <br>твоя логика.</h1>
        <p>Биохакинг, дисциплина и наука для тех, кто строит себя сам.</p>
    </section>

    <main class="main-container">
        <div class="section-title">Свежие публикации</div>
        <div id="articles-container">
            <h2 id="status">Подключение к архивам...</h2>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">HEALTHLOGIC</div>
        <p style="opacity: 0.5; font-weight: 700;">© 2026 Сделано для атлетов будущего.</p>
    </footer>

    <script>
        function loadArticles() {
            const container = document.getElementById('articles-container');
            
            db.ref('articles').orderByChild('timestamp').on('value', (snapshot) => {
                const data = snapshot.val();
                container.innerHTML = ''; 

                if (!data) {
                    container.innerHTML = '<h2>Библиотека пуста. Ждем новых данных.</h2>';
                    return;
                }

                // Сортируем (новые сверху)
                const keys = Object.keys(data).reverse();

                keys.forEach(id => {
                    const post = data[id];
                    container.innerHTML += `
                        <a href="article.html?id=${id}" class="article-card">
                            <img src="${post.image || 'https://via.placeholder.com/600x400'}" class="card-img" onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'">
                            <div class="card-content">
                                <span class="card-tag">Публикация</span>
                                <h2>${post.title}</h2>
                            </div>
                            <div class="card-footer">
                                <span>👀 ${post.views || 0}</span>
                                <span style="color: var(--accent);">Читать →</span>
                            </div>
                        </a>
                    `;
                });
            }, (error) => {
                document.getElementById('status').innerText = "Ошибка связи.";
            });
        }

        window.onload = loadArticles;
    </script>
</body>
</html>
